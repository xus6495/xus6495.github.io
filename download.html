<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>下载资源 - 为友</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      color: #fff;
      text-align: center;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 25px;
    }

    .intro {
      text-align: left;
      line-height: 1.8;
      font-size: 15px;
      opacity: 0.9;
    }

    .section {
      margin: 20px 0;
      padding: 15px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
    }

    .section-title {
      font-weight: 500;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .resource-list {
      margin-top: 20px;
    }

    .resource-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 15px;
      padding: 12px 15px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .resource-info {
      text-align: left;
      flex: 1;
      min-width: 0;
    }

    .resource-name {
      font-weight: 500;
    }

    .resource-desc {
      font-size: 13px;
      opacity: 0.8;
      margin-top: 5px;
      line-height: 1.4;
      word-break: break-all;
    }

    .download-btn {
      flex-shrink: 0;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.3);
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s;
    }

    .download-btn:hover {
      background: rgba(255, 255, 255, 0.4);
    }

    .back {
      display: inline-block;
      margin-top: 20px;
      color: #fff;
      text-decoration: none;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      transition: all 0.3s;
    }

    .back:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .loading {
      text-align: center;
      opacity: 0.7;
    }

    @media (max-width: 480px) {
      .card {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>下载资源</h1>
    
    <div class="intro">
      <div class="section">
        <div class="section-title">📚 资源列表</div>
        <div id="resource-list" class="resource-list">
          <p class="loading">加载中...</p>
        </div>
      </div>
    </div>

    <a href="index.html" class="back">← 返回首页</a>
  </div>

  <script>
    fetch('resources.json')
      .then(response => response.json())
      .then(data => {
        const container = document.getElementById('resource-list');
        container.innerHTML = data.map(item => `
          <div class="resource-item">
            <div class="resource-info">
              <div class="resource-name">${item.name}</div>
              <div class="resource-desc">${item.desc}</div>
            </div>
            <a href="${item.path}" class="download-btn" download>下载</a>
          </div>
        `).join('');
      })
      .catch(err => {
        document.getElementById('resource-list').innerHTML = '<p>加载失败</p>';
      });
  </script>
</body>
</html>
