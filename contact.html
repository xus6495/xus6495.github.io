<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联系我 - 为友</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      color: #fff;
      text-align: center;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 25px;
    }

    .qr-code {
      width: 250px;
      height: auto;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .divider {
      width: 40px;
      height: 1px;
      background: rgba(255, 255, 255, 0.4);
      margin: 20px auto;
    }

    .email {
      color: rgba(255, 255, 255, 0.9);
      font-size: 16px;
    }

    .back {
      display: inline-block;
      margin-top: 30px;
      color: #fff;
      text-decoration: none;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      transition: all 0.3s;
    }

    .back:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>联系我</h1>
    
    <img class="qr-code" src="images/wechat.jpg" alt="微信二维码">
    
    <div class="divider"></div>
    
    <span class="email">xus6495@163.com</span>

    <br>

    <a href="index.html" class="back">← 返回首页</a>
  </div>

</body>
</html>
