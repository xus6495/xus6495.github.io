<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>联系我 - 为友</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.card {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 24px;
  padding: 50px;
  max-width: 500px;
  width: 100%;
  color: #fff;
  text-align: center;
}

h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

.subtitle {
  opacity: 0.8;
  margin-bottom: 40px;
  font-size: 16px;
}

.email-box {
  background: rgba(255, 255, 255, 0.2);
  border-radius: 16px;
  padding: 30px;
  margin-bottom: 30px;
}

.email-icon {
  width: 60px;
  height: 60px;
  background: rgba(255, 255, 255, 0.3);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
}

.email-icon svg {
  width: 30px;
  height: 30px;
}

.email-address {
  font-size: 20px;
  font-weight: 500;
  letter-spacing: 1px;
  margin-bottom: 20px;
  word-break: break-all;
}

.copy-btn {
  background: rgba(255, 255, 255, 0.3);
  border: none;
  color: #fff;
  padding: 12px 30px;
  border-radius: 25px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.3s;
}

.copy-btn:hover {
  background: rgba(255, 255, 255, 0.4);
  transform: translateY(-2px);
}

.copy-btn.copied {
  background: rgba(76, 175, 80, 0.6);
}

.social-links {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 30px;
}

.social-links a {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  text-decoration: none;
  transition: all 0.3s;
}

.social-links a:hover {
  background: rgba(255, 255, 255, 0.3);
  transform: translateY(-3px);
}

.back {
  display: inline-block;
  color: #fff;
  text-decoration: none;
  padding: 12px 30px;
  background: rgba(255, 255, 255, 0.2);
  border-radius: 25px;
  transition: all 0.3s;
}

.back:hover {
  background: rgba(255, 255, 255, 0.3);
}

@media (max-width: 480px) {
  .card {
    padding: 40px 25px;
  }
  
  .email-address {
    font-size: 16px;
  }
}
</style>
</head>
<body>
<div class="card">
  <h1>联系我</h1>
  <p class="subtitle">有想法？欢迎交流 ✨</p>
  
  <div class="email-box">
    <div class="email-icon">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
      </svg>
    </div>
    <div class="email-address" id="email">xus6495@163.com</div>
    <button class="copy-btn" onclick="copyEmail()">复制邮箱</button>
  </div>
  
  <a href="index.html" class="back">← 返回首页</a>
</div>

<script>
function copyEmail() {
  const email = document.getElementById('email').textContent;
  navigator.clipboard.writeText(email).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '已复制！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '复制邮箱';
      btn.classList.remove('copied');
    }, 2000);
  });
}
</script>
</body>
</html>
