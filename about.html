<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>关于 - 为友</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.card {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 24px;
  padding: 40px;
  max-width: 600px;
  width: 100%;
  color: #fff;
}

h1 {
  font-size: 28px;
  margin-bottom: 20px;
}

p {
  line-height: 1.8;
  margin-bottom: 15px;
  opacity: 0.9;
}

.back {
  display: inline-block;
  margin-top: 20px;
  color: #fff;
  text-decoration: none;
  padding: 10px 20px;
  background: rgba(255, 255, 255, 0.2);
  border-radius: 20px;
  transition: all 0.3s;
}

.back:hover {
  background: rgba(255, 255, 255, 0.3);
}
</style>
</head>
<body>
<div class="card">
  <h1>关于我</h1>
  <p>这里是关于页面，你可以在这里写更多关于自己的介绍。</p>
  <p>比如兴趣爱好、工作经历、技能特长等等。</p>
  <a href="index.html" class="back">← 返回首页</a>
</div>
</body>
</html>
